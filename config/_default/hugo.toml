# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://blowfish.page/docs/getting-started/

# theme = "blowfish" # UNCOMMENT THIS LINE # IF you use hugo mod, NOT git submodule.
baseURL = "https://yjdyamv.codeberg.page/blogs/"
defaultContentLanguage = "zh-CN"

# pluralizeListTitles = "true" # hugo function useful for non-english languages, find out more in  https://gohugo.io/getting-started/configuration/#pluralizelisttitles

enableRobotsTXT = true
summaryLength = 0

buildDrafts = false
buildFuture = false
buildUseResourceCache = true

enableEmoji = true
enableMissingTranslationPlaceholders = false

# googleAnalytics = "G-XXXXXXXXX"

[pagination]
  pagerSize = 100

[imaging]
  anchor = 'Center'
  quality = 96
  [imaging.responsive]
    widths = [400, 600, 800, 1200, 1600]
    quality = 96
  [imaging.exif]
    disableDate = true
    disableLatLong = true
    disableCopyright = true

[taxonomies]
  tag = "tags"
  category = "categories"
  author = "authors"
  series = "series"

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 100

    [[related.indices]]
        name = "series"
        weight = 50

    [[related.indices]]
        name = "authors"
        weight = 20

    [[related.indices]]
        name = "date"
        weight = 10

    [[related.indices]]
      applyFilter = false
      name = 'fragmentrefs'
      type = 'fragments'
      weight = 10

[minify]
  disableXML = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepSpecialComments = true
      keepDefaultAttrVals = true
      keepDocumentTags = true
      keepEndTags = true
      keepQuotes = true
      keepWhitespace = false
    [minify.tdewolff.css]
      version = 3
      precision = 0
    [minify.tdewolff.js]
      keepVarNames = true
      noCopyright = true
      precision = 0
    [minify.tdewolff.json]
      keepNumbers = true
      precision = 0
    [minify.tdewolff.svg]
      keepComments = false
      precision = 0
    [minify.tdewolff.xml]
      keepWhitespace = false

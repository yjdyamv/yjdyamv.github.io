{{/* 扩展head部分，加载目录导航和其他增强脚本 */}}

{{ if or (eq .Section "posts") (eq .Type "posts") }}
  {{/* 只在文章页面加载目录导航 */}}
  <link rel="stylesheet" href="/css/toc-navigation.css" media="print" onload="this.media='all'" />
  <script src="/js/toc-navigation.js" defer></script>
  
  {{/* 加载博客增强脚本（集成所有功能） */}}
  <script src="/js/blog-enhancements.js" defer></script>
{{ end }}

{{/* 全局加载主题相关脚本 */}}
<link rel="stylesheet" href="/css/reading-progress.css" media="print" onload="this.media='all'" />
<script src="/js/reading-progress.js" defer></script>
<script src="/js/theme-persistence.js" defer></script>
<script src="/js/theme-adapter.js" defer></script>
